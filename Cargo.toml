[package]
name = "claude-report"
version = "0.1.1"
edition = "2024"
authors = ["Scott Idler <scott.idler@tatari.tv>"]
build = "build.rs"
description = "Scan Claude Code session JSONL files and emit a per-host JSON report"

[[bin]]
name = "cr"
path = "src/main.rs"

[dependencies]
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive"] }
claude-pricing = { git = "https://github.com/tatari-tv/claude-pricing", tag = "v0.1.0", version = "0.1.0", features = ["fetch"] }
colored = "3.1.1"
dirs = "6.0.0"
env_logger = "0.11.10"
eyre = "0.6.12"
gethostname = "1.1.0"
log = "0.4.29"
rayon = "1.12.0"
regex = "1.12.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tempfile = "3.27.0"
ureq = { version = "3.3.0", features = ["json"] }
wait-timeout = "0.2.1"
which = "8.0.2"
# Dependencies will be added via cargo add

[build-dependencies]
# For build.rs if needed
