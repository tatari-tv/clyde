name: ci

# Rust CI for the clyde workspace. Runs `otto ci` (whitespace + clippy + fmt + test)
# on a bare ubuntu-latest runner - no AWS/ECR dependency.
#
# Previously ran inside the org's private builder-base ECR image (see git history)
# to get otto/whitespace/sccache preinstalled. That image pull required assuming an
# AWS IAM role via OIDC, whose trust policy broke the moment this repo went public
# (2026-07-08) - ECR Auth started failing "Could not load credentials from any
# providers" on every push. Every OTHER public Rust repo in the org (the very tools
# clyde absorbed: claude-cost-usage, claude-permit, claude-pricing, claude-report;
# plus drata-cli, pagerduty-cli, renew, whitespace) avoids this entirely by
# installing tools directly on a bare runner instead of pulling a private
# container. This mirrors that pattern, plus the org's own `rust-ci.yml` reusable
# workflow (tatari-tv/github-actions) for the otto setup: dtolnay/rust-toolchain for
# Rust, otto-rs/setup-otto for otto, and a checksummed release-asset download for
# whitespace (also a public tatari-tv repo, so no auth needed there either). clyde
# has no private git deps - every workspace member is an in-workspace path crate.

on:
  push:
    branches:
      - "**"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RUST_VERSION: "1.96.0"
  WHITESPACE_VERSION: "v0.1.6"
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up otto
        # Pinned to setup-otto main (arch-aware asset suffix), matching
        # tatari-tv/github-actions/.github/workflows/rust-ci.yml - the v1 tag is
        # stale and downloads a nonexistent asset on Linux.
        uses: otto-rs/setup-otto@0676703d0c225f6c782235e181e4498a7726e4b5 # main (arch fix; v1 is stale)

      - name: Install whitespace
        uses: tatari-tv/github-actions/download-release-asset@v5
        with:
          url: https://github.com/tatari-tv/whitespace/releases/download/${{ env.WHITESPACE_VERSION }}/whitespace-${{ env.WHITESPACE_VERSION }}-linux-amd64.tar.gz
          sha256: 161f05245538456068af0f7bfb1d8cc4afb1e099fbab50724a638b672b953787
          binary-name: whitespace

      - name: otto ci
        run: otto ci
