name: ci

# Public repo: calls the PUBLIC reusable. tatari-tv/github-actions is internal and
# a public repo cannot resolve reusable workflows/actions from it, so this uses the
# public twin tatari-tv/github-actions-public. CI = `otto ci` via rust-ci.yml@v1;
# the caller owns the trigger. Toolchain (1.96.0) and whitespace (v0.1.6) use the
# reusable's defaults. clyde already ran the otto ci steps inline on a bare runner;
# this collapses that to the shared caller. pages.yml, refresh-pricing.yml,
# release.yml and sast.yml are preserved (release migrated separately).
on:
  push:
    branches: ['**']
  pull_request: {}

jobs:
  ci:
    uses: tatari-tv/github-actions-public/.github/workflows/rust-ci.yml@v1
