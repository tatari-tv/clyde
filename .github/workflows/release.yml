name: release

# Thin caller: delegates the tag-driven cross-compile -> tarball + sha256 ->
# GitHub Release to the shared public reusable. The binary and the repo are both
# named `clyde`, so the reusable's defaults (bin-names = archive-prefix = repo
# name) already produce clyde-<tag>-<suffix>.tar.gz(.sha256); no overrides needed.
#
# Only the canonical `clyde` binary ships. The report/cost/permit members are
# libraries reached through `clyde` subcommands, not separate binaries.
#
# Tag-push trigger only (no workflow_dispatch): the reusable's publish job has no
# tag-ref guard, so a manual dispatch on a branch would cut a Release named after
# the branch. This drops the old vendored file's workflow_dispatch tag-backfill
# input, which existed only to republish tags that the (now-removed) broken
# internal reusable failed to build while clyde was going public.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    uses: tatari-tv/github-actions-public/.github/workflows/rust-cli-release.yml@v1
