name: release

# Tag-driven release for clyde. On a v* tag, the org reusable cross-compiles the
# clyde umbrella binary for the four standard targets (linux amd64/arm64, macOS
# x86_64/arm64), tarballs + sha256 each, and publishes the GitHub Release.
#
# Only the canonical `clyde` binary is shipped here. The cr/ccu/claude-permit compat
# shims live in non-default workspace members (report/cost/permit) that a plain
# `cargo build --release` does not build, and they are a transitional source-install
# aid - so the release intentionally ships clyde alone.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cli-release:
    name: CLI Release
    uses: tatari-tv/github-actions/.github/workflows/rust-cli-release.yml@v5
    with:
      bin-names: clyde
