name: release

# Tag-driven release for clyde. On a v* tag, the org reusable cross-compiles the
# clyde umbrella binary for the four standard targets (linux amd64/arm64, macOS
# x86_64/arm64), tarballs + sha256 each, and publishes the GitHub Release.
#
# Only the canonical `clyde` binary is shipped. The report/cost/permit members are
# libraries reached through `clyde` subcommands; there are no separate binaries.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cli-release:
    name: CLI Release
    uses: tatari-tv/github-actions/.github/workflows/rust-cli-release.yml@v5
    with:
      bin-names: clyde
