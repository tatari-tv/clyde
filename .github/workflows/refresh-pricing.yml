name: Refresh Pricing

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh:
    name: Refresh pricing from Anthropic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run pricing/bin/update
        run: pricing/bin/update

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- pricing/data/pricing.json pricing/data/pricing-page.sha256; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: refresh-pricing
          delete-branch: true
          commit-message: 'data: refresh pricing from Anthropic'
          title: 'data: refresh pricing from Anthropic'
          body: |
            Automated daily refresh of `pricing/data/pricing.json` from
            <https://platform.claude.com/docs/en/about-claude/pricing.md>.

            Review the diff carefully before merging - the awk parser is
            the only piece of fragility in this pipeline.

            This is a data-only refresh: do **not** bump the crate version.
            Merging to `main` deploys the new feed to GitHub Pages (`pages.yml`),
            and clyde picks it up at runtime within ~24h. Cut a tag only for
            library code changes (`pricing/src/**`).
          add-paths: |
            pricing/data/pricing.json
            pricing/data/pricing-page.sha256

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue create \
            --title "Refresh Pricing workflow failed (run ${GITHUB_RUN_ID})" \
            --body "The daily pricing refresh workflow failed. Run: ${RUN_URL}

          Likely causes (in rough order of probability):
          - Anthropic restructured pricing.md and the awk + Python parsers no longer agree on the parse, or one of the regression checks tripped.
          - GitHub Actions PR-creation permission is disabled at the org or repo level.
          - Network issue fetching pricing.md.

          Check the run log for the specific failure step." \
            --label "automation" \
            || echo "could not create issue (check 'issues: write' permission)"
